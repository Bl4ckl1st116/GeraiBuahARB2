{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<h1>Cetak Laporan Pengadaan (Rentang Tanggal)</h1>
<div class="container py-5 mt-5">
<form method="post">
    {% csrf_token %}

    <input type="hidden" name="action" value="export_pdf_by_date">

    {% for obj in queryset %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
    {% endfor %}

    <div>
        <label>Tanggal Awal:</label><br>
        <input type="date" name="start_date" required>
    </div>

    <br>

    <div>
        <label>Tanggal Akhir:</label><br>
        <input type="date" name="end_date" required>
    </div>

    <br>

    <input type="submit" value="Cetak Laporan" class="default">
</form>
</div>
{% endblock %}
